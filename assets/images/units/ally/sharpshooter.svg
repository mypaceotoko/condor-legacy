<svg xmlns="http://www.w3.org/2000/svg" width="68" height="80" viewBox="0 0 68 80">
<defs>
  <linearGradient id="dr" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f0ece0"/><stop offset="100%" stop-color="#c8c4b0"/></linearGradient>
  <linearGradient id="sk" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f4c898"/><stop offset="100%" stop-color="#d49868"/></linearGradient>
  <linearGradient id="hr" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f8e040"/><stop offset="100%" stop-color="#c09010"/></linearGradient>
  <linearGradient id="xb" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7a5028"/><stop offset="100%" stop-color="#4a2e10"/></linearGradient>
</defs>
<ellipse cx="30" cy="78" rx="14" ry="3" fill="rgba(0,0,0,0.25)"/>
<!-- Brown sandals -->
<rect x="16" y="72" width="15" height="7" rx="2" fill="#6a3818"/>
<rect x="32" y="70" width="13" height="7" rx="2" fill="#6a3818"/>
<line x1="18" y1="74" x2="30" y2="74" stroke="#4a2408" stroke-width="1.5" opacity="0.6"/>
<line x1="34" y1="72" x2="44" y2="72" stroke="#4a2408" stroke-width="1.5" opacity="0.6"/>
<!-- Running legs (white dress draped) -->
<path d="M18 52 L24 78 L32 78 L28 52Z" fill="url(#dr)"/>
<path d="M36 50 L44 74 L38 76 L30 52Z" fill="url(#dr)"/>
<!-- White flowing dress/robe body -->
<path d="M14 24 Q34 20 54 24 L56 58 L12 60Z" fill="url(#dr)"/>
<!-- Dress fold lines -->
<path d="M18 28 L16 58" stroke="#b8b4a4" stroke-width="0.8" opacity="0.5"/>
<path d="M32 24 L30 58" stroke="#b8b4a4" stroke-width="0.8" opacity="0.4"/>
<path d="M46 26 L50 58" stroke="#b8b4a4" stroke-width="0.8" opacity="0.4"/>
<!-- Rope belt/sash detail -->
<path d="M16 40 Q34 36 52 40" fill="none" stroke="#9a7840" stroke-width="2" opacity="0.5"/>
<!-- Brown cylindrical quiver on back (left side) -->
<rect x="4" y="22" width="10" height="26" rx="4" fill="#6a3818"/>
<ellipse cx="9" cy="22" rx="5" ry="2.5" fill="#7a4820"/>
<line x1="6" y1="26" x2="12" y2="26" stroke="#4a2408" stroke-width="0.8" opacity="0.5"/>
<!-- Left arm (back, toward quiver) -->
<rect x="6" y="28" width="9" height="16" rx="2" fill="url(#sk)"/>
<!-- Right arm extended holding crossbow -->
<rect x="44" y="28" width="8" height="16" rx="2" fill="url(#sk)" transform="rotate(-15,48,36)"/>
<!-- Brown leather bracers -->
<rect x="5" y="38" width="11" height="5" rx="1" fill="#7a4020"/>
<rect x="44" y="36" width="10" height="5" rx="1" fill="#7a4020"/>
<!-- CROSSBOW (main body - wood) -->
<rect x="36" y="30" width="24" height="6" rx="1" fill="url(#xb)"/>
<!-- Crossbow stock -->
<rect x="52" y="29" width="8" height="8" rx="1" fill="#5a3810"/>
<!-- Crossbow arms (horizontal) -->
<rect x="34" y="28" width="20" height="3" rx="1" fill="#8a8070"/>
<!-- Crossbow string -->
<line x1="34" y1="29" x2="44" y2="33" stroke="#d0c8a0" stroke-width="0.9"/>
<line x1="54" y1="29" x2="44" y2="33" stroke="#d0c8a0" stroke-width="0.9"/>
<!-- Arrow nocked -->
<line x1="36" y1="33" x2="60" y2="33" stroke="#a07830" stroke-width="1.5"/>
<polygon points="58,30 65,33 58,36" fill="#c04020"/>
<!-- Leather collar -->
<rect x="24" y="22" width="18" height="4" rx="2" fill="#7a4020"/>
<!-- Head (larger chibi proportions) -->
<ellipse cx="30" cy="14" rx="14" ry="15" fill="url(#sk)"/>
<!-- Green eyes (determined) -->
<ellipse cx="24" cy="13" rx="4" ry="4.5" fill="#107038"/>
<ellipse cx="36" cy="13" rx="4" ry="4.5" fill="#107038"/>
<ellipse cx="24" cy="12" rx="2.5" ry="3" fill="#20b060"/>
<ellipse cx="36" cy="12" rx="2.5" ry="3" fill="#20b060"/>
<circle cx="23" cy="11" r="1.3" fill="#ffffff" opacity="0.85"/>
<circle cx="35" cy="11" r="1.3" fill="#ffffff" opacity="0.85"/>
<!-- Eyebrows (sharp, light) -->
<path d="M20 8 Q24 6 28 8" fill="none" stroke="#9a8010" stroke-width="1.8" stroke-linecap="round"/>
<path d="M32 8 Q36 6 40 8" fill="none" stroke="#9a8010" stroke-width="1.8" stroke-linecap="round"/>
<!-- Nose/mouth (determined look) -->
<path d="M28 18 Q30 20 32 18" fill="none" stroke="#b08050" stroke-width="1" opacity="0.55"/>
<!-- Blonde hair base (round volume) -->
<ellipse cx="30" cy="6" rx="15" ry="11" fill="url(#hr)"/>
<ellipse cx="30" cy="5" rx="10" ry="7" fill="#f8e858" opacity="0.5"/>
<!-- High ponytail flowing back/up -->
<path d="M36 2 Q46,-4 56,0 Q60,6 54,10 Q46,8 40,4 Q38,2 36,2Z" fill="url(#hr)"/>
<!-- Ponytail flowing curls -->
<path d="M54 0 Q64,2 66,8 Q62,12 56,10" fill="none" stroke="#f0d030" stroke-width="3" stroke-linecap="round"/>
<path d="M56 8 Q62,12 60,18" fill="none" stroke="#e0c020" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
<!-- White hair tie -->
<ellipse cx="36" cy="2" rx="3.5" ry="2.5" fill="#f0f0ec"/>
<!-- Hair highlight -->
<path d="M20 5 Q30 0 40 4" fill="none" stroke="#fff870" stroke-width="1.5" opacity="0.6"/>
</svg>