<svg xmlns="http://www.w3.org/2000/svg" width="68" height="80" viewBox="0 0 68 80">
<defs>
  <radialGradient id="bd" cx="40%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#e8b8a0"/>
    <stop offset="60%" stop-color="#c89080"/>
    <stop offset="100%" stop-color="#a06848"/>
  </radialGradient>
  <radialGradient id="eye" cx="35%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#d8d0c8"/>
  </radialGradient>
  <linearGradient id="tr" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#3a3a3a"/>
    <stop offset="100%" stop-color="#1a1a1a"/>
  </linearGradient>
</defs>

<!-- Ground shadow -->
<ellipse cx="34" cy="78" rx="22" ry="3" fill="rgba(0,0,0,0.4)"/>

<!-- Tank treads (main track body) -->
<rect x="4" y="55" width="60" height="18" rx="9" fill="url(#tr)"/>
<!-- Track link segments -->
<rect x="4" y="55" width="60" height="3" rx="1" fill="#2a2a2a" opacity="0.6"/>
<rect x="4" y="70" width="60" height="3" rx="1" fill="#2a2a2a" opacity="0.6"/>
<line x1="10" y1="55" x2="10" y2="73" stroke="#222" stroke-width="1" opacity="0.5"/>
<line x1="18" y1="55" x2="18" y2="73" stroke="#222" stroke-width="1" opacity="0.5"/>
<line x1="26" y1="55" x2="26" y2="73" stroke="#222" stroke-width="1" opacity="0.5"/>
<line x1="34" y1="55" x2="34" y2="73" stroke="#222" stroke-width="1" opacity="0.5"/>
<line x1="42" y1="55" x2="42" y2="73" stroke="#222" stroke-width="1" opacity="0.5"/>
<line x1="50" y1="55" x2="50" y2="73" stroke="#222" stroke-width="1" opacity="0.5"/>
<line x1="58" y1="55" x2="58" y2="73" stroke="#222" stroke-width="1" opacity="0.5"/>
<!-- Tread wheels -->
<circle cx="14" cy="64" r="7" fill="#1e1e1e" stroke="#333" stroke-width="0.8"/>
<circle cx="14" cy="64" r="3" fill="#2a2a2a"/>
<circle cx="34" cy="64" r="7" fill="#1e1e1e" stroke="#333" stroke-width="0.8"/>
<circle cx="34" cy="64" r="3" fill="#2a2a2a"/>
<circle cx="54" cy="64" r="7" fill="#1e1e1e" stroke="#333" stroke-width="0.8"/>
<circle cx="54" cy="64" r="3" fill="#2a2a2a"/>

<!-- Left arm (stubby, drooping) -->
<ellipse cx="9" cy="46" rx="9" ry="7" fill="url(#bd)" transform="rotate(20,9,46)"/>
<!-- Left fist -->
<ellipse cx="5" cy="54" rx="6" ry="5" fill="#b87860"/>
<path d="M2 51 Q5 58 9 55" fill="#a06850" opacity="0.5"/>

<!-- Right arm -->
<ellipse cx="59" cy="46" rx="9" ry="7" fill="url(#bd)" transform="rotate(-20,59,46)"/>
<!-- Right fist -->
<ellipse cx="63" cy="54" rx="6" ry="5" fill="#b87860"/>
<path d="M66 51 Q63 58 59 55" fill="#a06850" opacity="0.5"/>

<!-- Main head/body (large round sphere) -->
<circle cx="34" cy="32" r="26" fill="url(#bd)"/>
<!-- Subtle skin texture highlight -->
<ellipse cx="28" cy="20" rx="10" ry="8" fill="#f0caa8" opacity="0.3"/>

<!-- Left eye (googly, wide) -->
<circle cx="22" cy="26" r="10" fill="url(#eye)" stroke="#c0a888" stroke-width="0.5"/>
<circle cx="24" cy="28" r="5" fill="#9a7858"/>
<circle cx="25" cy="27" r="3" fill="#2a1808"/>
<circle cx="24" cy="26" r="1.2" fill="#ffffff" opacity="0.9"/>

<!-- Right eye -->
<circle cx="46" cy="26" r="10" fill="url(#eye)" stroke="#c0a888" stroke-width="0.5"/>
<circle cx="48" cy="28" r="5" fill="#9a7858"/>
<circle cx="49" cy="27" r="3" fill="#2a1808"/>
<circle cx="48" cy="26" r="1.2" fill="#ffffff" opacity="0.9"/>

<!-- Nose (tiny nostrils) -->
<circle cx="31" cy="36" r="1.5" fill="#9a6040" opacity="0.7"/>
<circle cx="37" cy="36" r="1.5" fill="#9a6040" opacity="0.7"/>

<!-- Wide open mouth -->
<path d="M18 44 Q34 54 50 44" fill="#b83050"/>
<ellipse cx="34" cy="47" rx="14" ry="7" fill="#c83060"/>
<!-- Inner dark mouth -->
<ellipse cx="34" cy="47" rx="10" ry="5" fill="#6a0818"/>
<!-- Tongue drooling down -->
<path d="M26 50 Q34 62 42 50 Q38 54 34 56 Q30 54 26 50Z" fill="#e05070"/>
<path d="M30 54 Q34 60 38 54" fill="none" stroke="#c03050" stroke-width="1" opacity="0.6"/>
<!-- Drool drop -->
<ellipse cx="34" cy="60" rx="2" ry="3" fill="#e06080" opacity="0.7"/>

<!-- Lips outline -->
<path d="M18 44 Q26 42 34 43 Q42 42 50 44" fill="none" stroke="#901830" stroke-width="1.5" stroke-linecap="round"/>
</svg>
