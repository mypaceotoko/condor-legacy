<svg xmlns="http://www.w3.org/2000/svg" width="68" height="80" viewBox="0 0 68 80">
<defs>
  <linearGradient id="wd" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#8a5e2a"/>
    <stop offset="100%" stop-color="#5a3810"/>
  </linearGradient>
  <linearGradient id="mt" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7a7a8a"/>
    <stop offset="100%" stop-color="#3a3a4a"/>
  </linearGradient>
  <radialGradient id="rk" cx="35%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#a0a0a0"/>
    <stop offset="100%" stop-color="#606060"/>
  </radialGradient>
</defs>

<!-- Ground shadow -->
<ellipse cx="34" cy="78" rx="28" ry="3" fill="rgba(0,0,0,0.35)"/>

<!-- Sandbags (base left) -->
<ellipse cx="10" cy="70" rx="8" ry="5" fill="#c0a060"/>
<ellipse cx="10" cy="66" rx="7" ry="4" fill="#b89050"/>
<ellipse cx="22" cy="70" rx="7" ry="5" fill="#c0a060"/>

<!-- Wooden base platform -->
<rect x="6" y="65" width="56" height="11" rx="2" fill="url(#wd)"/>
<line x1="14" y1="65" x2="14" y2="76" stroke="#3a2208" stroke-width="1" opacity="0.5"/>
<line x1="26" y1="65" x2="26" y2="76" stroke="#3a2208" stroke-width="1" opacity="0.5"/>
<line x1="38" y1="65" x2="38" y2="76" stroke="#3a2208" stroke-width="1" opacity="0.5"/>
<line x1="50" y1="65" x2="50" y2="76" stroke="#3a2208" stroke-width="1" opacity="0.5"/>
<!-- Metal straps on base -->
<rect x="6" y="65" width="56" height="3" rx="1" fill="url(#mt)" opacity="0.6"/>
<rect x="6" y="73" width="56" height="3" rx="1" fill="url(#mt)" opacity="0.5"/>

<!-- Rocks on ground (ammo pile) -->
<ellipse cx="12" cy="63" rx="5" ry="4" fill="url(#rk)"/>
<ellipse cx="20" cy="62" rx="4" ry="3" fill="#909090"/>
<ellipse cx="16" cy="59" rx="3" ry="2.5" fill="#888888"/>

<!-- A-frame left leg -->
<rect x="18" y="38" width="6" height="30" rx="2" fill="url(#wd)" transform="rotate(-18,21,53)"/>
<!-- A-frame right leg -->
<rect x="34" y="38" width="6" height="30" rx="2" fill="url(#wd)" transform="rotate(12,37,53)"/>

<!-- Cross brace -->
<rect x="18" y="50" width="22" height="5" rx="2" fill="url(#wd)" opacity="0.9"/>

<!-- Metal pivot hub (center) -->
<rect x="26" y="36" width="14" height="10" rx="3" fill="url(#mt)"/>
<circle cx="33" cy="41" r="4" fill="#505060"/>
<circle cx="33" cy="41" r="2" fill="#3a3a4a"/>

<!-- Throwing arm (long side, upper right) -->
<rect x="32" y="10" width="5" height="34" rx="2" fill="#9a6828" transform="rotate(35,34,41)"/>
<!-- Arm highlight -->
<rect x="33" y="12" width="2" height="30" rx="1" fill="#b07830" opacity="0.5" transform="rotate(35,34,41)"/>

<!-- Short arm / counterweight side -->
<rect x="20" y="36" width="5" height="18" rx="2" fill="#8a6020" transform="rotate(-145,33,41)"/>

<!-- Metal fittings on arm -->
<rect x="52" y="10" width="8" height="6" rx="1" fill="url(#mt)" transform="rotate(35,56,13)"/>

<!-- Rock bucket at top of arm -->
<path d="M54 8 Q60 5 66 8 L64 16 Q60 18 56 16Z" fill="#7a5020"/>
<path d="M55 9 Q60 7 65 9" fill="none" stroke="#5a3810" stroke-width="1"/>
<!-- Rocks in bucket -->
<ellipse cx="58" cy="10" rx="4" ry="3" fill="url(#rk)"/>
<ellipse cx="62" cy="9" rx="3" ry="2.5" fill="#909090"/>
<ellipse cx="60" cy="7" rx="2.5" ry="2" fill="#a0a0a0"/>

<!-- Rope from arm to frame -->
<path d="M54 14 Q48 24 36 32" fill="none" stroke="#c8a840" stroke-width="1.5" stroke-linecap="round"/>
<path d="M54 14 Q50 26 40 36" fill="none" stroke="#b89830" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

<!-- Wooden crate (right side) -->
<rect x="52" y="62" width="12" height="10" rx="1" fill="#7a5028"/>
<line x1="58" y1="62" x2="58" y2="72" stroke="#3a2208" stroke-width="0.8" opacity="0.6"/>
<line x1="52" y1="67" x2="64" y2="67" stroke="#3a2208" stroke-width="0.8" opacity="0.6"/>
<rect x="53" y="62" width="10" height="2" rx="0.5" fill="url(#mt)" opacity="0.5"/>
</svg>
