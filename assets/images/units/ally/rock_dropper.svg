<svg xmlns="http://www.w3.org/2000/svg" width="68" height="80" viewBox="0 0 68 80">
<defs>
  <linearGradient id="wd" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#8a5e2a"/>
    <stop offset="100%" stop-color="#5a3810"/>
  </linearGradient>
  <linearGradient id="mt" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7a7a8a"/>
    <stop offset="100%" stop-color="#3a3a4a"/>
  </linearGradient>
  <radialGradient id="rk" cx="35%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#aaaaaa"/>
    <stop offset="100%" stop-color="#585858"/>
  </radialGradient>
</defs>

<!-- Ground shadow -->
<ellipse cx="34" cy="78" rx="24" ry="3" fill="rgba(0,0,0,0.35)"/>

<!-- Wooden base -->
<rect x="8" y="67" width="52" height="10" rx="2" fill="url(#wd)"/>
<line x1="18" y1="67" x2="18" y2="77" stroke="#3a2208" stroke-width="0.8" opacity="0.5"/>
<line x1="34" y1="67" x2="34" y2="77" stroke="#3a2208" stroke-width="0.8" opacity="0.5"/>
<line x1="50" y1="67" x2="50" y2="77" stroke="#3a2208" stroke-width="0.8" opacity="0.5"/>
<rect x="8" y="67" width="52" height="3" rx="1" fill="url(#mt)" opacity="0.5"/>

<!-- Left upright post -->
<rect x="14" y="28" width="7" height="40" rx="2" fill="url(#wd)"/>
<!-- Right upright post -->
<rect x="47" y="28" width="7" height="40" rx="2" fill="url(#wd)"/>

<!-- Cross beams -->
<rect x="12" y="36" width="44" height="5" rx="2" fill="url(#wd)"/>
<rect x="12" y="50" width="44" height="5" rx="2" fill="url(#wd)"/>

<!-- Metal corner fittings -->
<rect x="12" y="27" width="10" height="8" rx="1" fill="url(#mt)"/>
<rect x="46" y="27" width="10" height="8" rx="1" fill="url(#mt)"/>
<rect x="12" y="64" width="10" height="6" rx="1" fill="url(#mt)"/>
<rect x="46" y="64" width="10" height="6" rx="1" fill="url(#mt)"/>

<!-- Pulley wheel (top center) -->
<circle cx="34" cy="28" r="6" fill="url(#mt)"/>
<circle cx="34" cy="28" r="3" fill="#505060"/>
<circle cx="34" cy="28" r="1.5" fill="#2a2a3a"/>

<!-- Rope over pulley -->
<line x1="34" y1="22" x2="34" y2="4" stroke="#c8a840" stroke-width="1.5"/>
<line x1="34" y1="34" x2="34" y2="54" stroke="#c8a840" stroke-width="1.5"/>

<!-- Rock held at top (loaded position) -->
<circle cx="34" cy="10" r="8" fill="url(#rk)"/>
<circle cx="31" cy="7" r="3" fill="#909090" opacity="0.6"/>
<circle cx="36" cy="12" r="2" fill="#606060" opacity="0.5"/>

<!-- Rope attachment ring on rock -->
<circle cx="34" cy="3" r="2" fill="url(#mt)"/>

<!-- Rock pile on ground (ammo) -->
<ellipse cx="10" cy="65" rx="5" ry="4" fill="url(#rk)"/>
<ellipse cx="18" cy="64" rx="4" ry="3" fill="#888"/>
<ellipse cx="13" cy="61" rx="3" ry="2.5" fill="#909090"/>

<!-- Release lever (side) -->
<rect x="52" y="52" width="10" height="3" rx="1" fill="url(#wd)" transform="rotate(-25,57,53)"/>
<circle cx="60" cy="49" r="3" fill="url(#mt)"/>

<!-- Sandbag (right) -->
<ellipse cx="60" cy="65" rx="6" ry="4" fill="#c0a060"/>
<ellipse cx="60" cy="63" rx="5" ry="2.5" fill="#b09050"/>
</svg>
